name: CI

# Runs the test suite on GitHub's hardware (reliable, fast) so the autonomous
# agent does not need a heavy local build host. The agent pushes; this verifies.
#
# Tiers:
#  - unit-tests: Tier 1, pure-JVM logic tests (fast, no emulator).
#  - (planned) instrumented-tests: Tier 3, Android emulator + AnkiDroid +
#    screenshot capture, added as a separate job once Tier 1 is green.

on:
  push:
    branches: [main, 'auto/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (Tier 1, JVM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # build.gradle.kts reads ANTHROPIC_API_KEY from local.properties. Empty is
      # fine for unit tests (no network/LLM exercised); kept for parity with the
      # release build.
      - name: Write local.properties
        run: echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> local.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn

  ui-check:
    name: Instrumented UI tests (Tier 3, emulator)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> local.properties

      # GitHub's Linux runners support nested virtualization; this grants the
      # emulator access to /dev/kvm for hardware acceleration.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator, install app, capture UI screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: bash scripts/ci_ui_check.sh

      - name: Upload screenshot, UI dump, instrumented-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-ui
          path: |
            screenshot.png
            ui.xml
            spikelog.txt
            ankidroid.png
            ankidroid_ui.xml
            app/build/reports/androidTests/connected
            app/build/outputs/androidTest-results/connected
          if-no-files-found: warn
