name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Persists the auto-generated ~/.android/debug.keystore across runs so
      # every APK is signed with the same cert. Without this, every CI build
      # would have a different signature and Android would refuse in-place
      # updates ("App not installed as package conflicts with an existing
      # package"). Cache is keyed by a fixed string; if GH evicts it, the
      # next install requires uninstalling first — then we're stable again.
      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish rolling 'latest-debug' release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest debug build
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            Auto-built debug APK from the latest `main`.

            **Commit:** `${{ github.sha }}`

            ## Install on your phone

            1. Open this page in your phone's browser.
            2. Tap the APK below to download.
            3. Tap the downloaded file to install. If Android asks, allow your browser to install unknown apps (Settings prompt appears once).
            4. Grant the AnkiDroid `READ_WRITE_DATABASE` permission the first time the app runs.
