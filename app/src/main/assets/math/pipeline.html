<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>anki-voice math pipeline</title>
<script>
// Helper: log to both Kotlin (if bridge ready) and JS console.
function diag(msg) {
    try { console.log('[shim] ' + msg); } catch (_) {}
    try { if (window.AndroidBridge) AndroidBridge.log(msg); } catch (_) {}
}

window.onerror = function(msg, src, line, col, err) {
    diag('window.onerror: ' + msg + ' @ ' + src + ':' + line + ':' + col + ' stack=' + (err && err.stack));
    return false;
};

window.onunhandledrejection = function(event) {
    var r = event.reason;
    diag('unhandledrejection: ' + (r && r.message ? r.message : r) + ' stack=' + (r && r.stack));
};

diag('shim script tag executing');

// Configure MathJax BEFORE the script loads — startup reads window.MathJax.
window.MathJax = {
    tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
    },
    options: { enableMenu: false },
    startup: {
        typeset: false,
        ready: function() {
            diag('MathJax startup.ready fired');
            MathJax.startup.defaultReady();
        }
    }
};
</script>
<script src="tex-chtml.js" onerror="diag('FATAL: tex-chtml.js failed to load')"></script>
<script src="sre.js" onerror="diag('FATAL: sre.js failed to load')"></script>
<script>
diag('post-script tags. typeof MathJax=' + typeof MathJax + ' typeof SRE=' + typeof SRE);

let pipelineReady = false;

(async function init() {
    try {
        diag('init() entered');
        if (typeof MathJax === 'undefined') throw new Error('MathJax global missing — tex-chtml.js never loaded');
        if (typeof SRE === 'undefined') throw new Error('SRE global missing — sre.js never loaded');

        diag('awaiting MathJax.startup.promise');
        await MathJax.startup.promise;
        diag('MathJax ready');

        diag('calling SRE.setupEngine');
        await SRE.setupEngine({
            domain: 'clearspeak',
            style: 'default',
            locale: 'en',
            modality: 'speech',
            json: 'mathmaps/',
            // Custom loader gives us explicit fetch + logging instead of
            // SRE's opaque XHR. We control the URL, see the response, and
            // surface failures via diag().
            custom: function(locale) {
                return new Promise(async function(resolve, reject) {
                    var url = 'mathmaps/' + locale + '.json';
                    diag('customLoader: locale=' + locale + ' url=' + url);
                    try {
                        var res = await fetch(url);
                        diag('customLoader: status=' + res.status + ' for ' + locale);
                        if (!res.ok) {
                            reject(new Error('mathmap ' + locale + ' fetch ' + res.status));
                            return;
                        }
                        var text = await res.text();
                        diag('customLoader: got ' + text.length + ' bytes for ' + locale);
                        resolve(text);
                    } catch (e) {
                        diag('customLoader: exception for ' + locale + ': ' + e.message);
                        reject(e);
                    }
                });
            }
        });
        diag('SRE.setupEngine returned');

        pipelineReady = true;
        if (window.AndroidBridge) {
            diag('calling AndroidBridge.onReady');
            AndroidBridge.onReady();
        } else {
            diag('AndroidBridge missing at ready time');
        }
    } catch (e) {
        diag('init catch: ' + (e && e.message));
        if (window.AndroidBridge) AndroidBridge.onError('init failed: ' + (e && e.message) + ' / ' + (e && e.stack));
    }
})();

// Called from Kotlin via evaluateJavascript.
// Returns a JSON-encoded { speechText } or { error }.
function extractSpeech(rawHtml) {
    if (!pipelineReady) return JSON.stringify({ error: 'pipeline not ready' });

    let text = String(rawHtml);
    text = text.replace(/\$\$([\s\S]+?)\$\$/g, '\\[$1\\]');
    text = text.replace(/\[latex\]([\s\S]+?)\[\/latex\]/g, '\\[$1\\]');

    const re = /\\\(([\s\S]+?)\\\)|\\\[([\s\S]+?)\\\]/g;
    let out = '';
    let lastIndex = 0;
    let m;

    while ((m = re.exec(text)) !== null) {
        out += stripTags(text.slice(lastIndex, m.index));
        const latex = m[1] || m[2];
        try {
            const mathml = MathJax.tex2mml(latex, { display: !!m[2] });
            out += ' ' + SRE.toSpeech(mathml) + ' ';
        } catch (e) {
            out += ' math error ';
        }
        lastIndex = re.lastIndex;
    }
    out += stripTags(text.slice(lastIndex));

    out = out.replace(/\s+/g, ' ').trim();
    return JSON.stringify({ speechText: out });
}

function stripTags(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    return div.textContent || '';
}
</script>
</head>
<body></body>
</html>
